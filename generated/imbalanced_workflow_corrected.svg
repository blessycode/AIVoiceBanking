<svg xmlns="http://www.w3.org/2000/svg" width="560" height="980" viewBox="0 0 560 980">
  <defs>
    <style>
      .label { font-family: "DejaVu Sans", Arial, sans-serif; fill: #1f1f1f; }
      .small { font-size: 12px; }
      .medium { font-size: 15px; }
      .box-title { font-size: 15px; font-weight: 700; }
      .box-body { font-size: 14px; }
      .left-box { fill: #ffffff; stroke: #222222; stroke-width: 2; }
      .right-box { fill: #d7ebff; stroke: #4a5a66; stroke-width: 2; }
      .top-box { fill: #d7d7d7; stroke: #666666; stroke-width: 2; }
      .bottom-box { fill: #dff0c9; stroke: #6f8660; stroke-width: 2; }
      .arrow { stroke: #444444; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #555555; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .side-label { font-size: 13px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8.5" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#444444" />
    </marker>
  </defs>

  <rect x="0" y="0" width="560" height="980" fill="#ffffff" />

  <rect x="170" y="24" width="360" height="126" rx="0" fill="#d8d8d8" />
  <rect x="170" y="160" width="360" height="576" rx="0" fill="#d8ebff" />
  <rect x="170" y="744" width="360" height="196" rx="0" fill="#ddf0ca" />

  <text x="20" y="500" class="label side-label" text-anchor="middle" transform="rotate(-90 20 500)">Overall workflow for imbalanced data</text>

  <rect x="40" y="24" width="104" height="72" class="left-box" />
  <text x="92" y="52" class="label medium" text-anchor="middle">
    <tspan x="92" dy="0">Original</tspan>
    <tspan x="92" dy="18">dataset</tspan>
  </text>

  <rect x="40" y="170" width="104" height="72" class="left-box" />
  <text x="92" y="198" class="label medium" text-anchor="middle">
    <tspan x="92" dy="0">Train-test</tspan>
    <tspan x="92" dy="18">split</tspan>
  </text>

  <rect x="30" y="404" width="124" height="132" class="left-box" />
  <text x="92" y="434" class="label medium" text-anchor="middle">
    <tspan x="92" dy="0">Data-level</tspan>
    <tspan x="92" dy="18">techniques</tspan>
    <tspan x="92" dy="18">and modelling</tspan>
    <tspan x="92" dy="18">(10 iterations)</tspan>
  </text>

  <rect x="40" y="768" width="104" height="78" class="left-box" />
  <text x="92" y="800" class="label medium" text-anchor="middle">
    <tspan x="92" dy="0">Statistical</tspan>
    <tspan x="92" dy="18">validation</tspan>
  </text>

  <rect x="40" y="886" width="104" height="70" class="left-box" />
  <text x="92" y="916" class="label medium" text-anchor="middle">
    <tspan x="92" dy="0">Final</tspan>
    <tspan x="92" dy="18">conclusions</tspan>
  </text>

  <line x1="92" y1="96" x2="92" y2="170" class="arrow" />
  <line x1="92" y1="242" x2="92" y2="404" class="arrow" />
  <line x1="92" y1="536" x2="92" y2="768" class="arrow" />
  <line x1="92" y1="846" x2="92" y2="886" class="arrow" />

  <rect x="278" y="34" width="160" height="50" rx="10" class="top-box" />
  <text x="358" y="63" class="label box-title" text-anchor="middle">Dataset</text>

  <rect x="278" y="102" width="160" height="58" rx="10" class="top-box" />
  <text x="358" y="128" class="label box-title" text-anchor="middle">Train-test split</text>
  <text x="358" y="147" class="label box-body" text-anchor="middle">(70/30)</text>

  <line x1="358" y1="84" x2="358" y2="102" class="arrow" />
  <line x1="358" y1="160" x2="358" y2="180" class="arrow" />

  <path d="M144 206 L220 206 L220 180 L278 180" class="arrow" />

  <text x="190" y="448" class="label side-label" text-anchor="middle" transform="rotate(-90 190 448)">Repeated 10 times</text>
  <text x="520" y="450" class="label side-label" text-anchor="middle" transform="rotate(90 520 450)">10 iterations</text>
  <path d="M510 188 L510 714" class="dash" />

  <rect x="220" y="182" width="276" height="86" rx="10" class="right-box" />
  <text x="358" y="208" class="label box-title" text-anchor="middle">Step 1: Sampling techniques</text>
  <text x="358" y="230" class="label box-body" text-anchor="middle">
    <tspan x="358" dy="0">(SMOTE-NC, SMOTE-ENC,</tspan>
    <tspan x="358" dy="18">G-SMOTE-NC, SMOTEENN-ENC)</tspan>
  </text>

  <rect x="220" y="282" width="276" height="64" rx="10" class="right-box" />
  <text x="358" y="308" class="label box-title" text-anchor="middle">Step 2: Distance metrics</text>
  <text x="358" y="328" class="label box-body" text-anchor="middle">(MED, MMD)</text>

  <rect x="220" y="360" width="276" height="64" rx="10" class="right-box" />
  <text x="358" y="386" class="label box-title" text-anchor="middle">Step 3: Robust Estimators</text>
  <text x="358" y="406" class="label box-body" text-anchor="middle">(MAD, FMCD, FMRCD)</text>

  <rect x="220" y="438" width="276" height="64" rx="10" class="right-box" />
  <text x="358" y="464" class="label box-title" text-anchor="middle">Step 4: Predictive Classifiers</text>
  <text x="358" y="484" class="label box-body" text-anchor="middle">(LR, RF)</text>

  <rect x="220" y="516" width="276" height="64" rx="10" class="right-box" />
  <text x="358" y="542" class="label box-title" text-anchor="middle">Step 5: Feature engineering</text>
  <text x="358" y="562" class="label box-body" text-anchor="middle">(RFE, AE-NET, E-NET)</text>

  <rect x="220" y="594" width="276" height="64" rx="10" class="right-box" />
  <text x="358" y="620" class="label box-title" text-anchor="middle">Step 6: Evaluation metrics</text>
  <text x="358" y="640" class="label box-body" text-anchor="middle">(GM, AUC, F1-score)</text>

  <rect x="220" y="672" width="276" height="86" rx="10" class="right-box" />
  <text x="358" y="698" class="label box-title" text-anchor="middle">Step 7: Evaluation measures</text>
  <text x="358" y="720" class="label box-body" text-anchor="middle">
    <tspan x="358" dy="0">(mean, SD, CV, median,</tspan>
    <tspan x="358" dy="18">average rank, time)</tspan>
  </text>

  <line x1="358" y1="268" x2="358" y2="282" class="arrow" />
  <line x1="358" y1="346" x2="358" y2="360" class="arrow" />
  <line x1="358" y1="424" x2="358" y2="438" class="arrow" />
  <line x1="358" y1="502" x2="358" y2="516" class="arrow" />
  <line x1="358" y1="580" x2="358" y2="594" class="arrow" />
  <line x1="358" y1="658" x2="358" y2="672" class="arrow" />
  <line x1="358" y1="758" x2="358" y2="776" class="arrow" />

  <rect x="208" y="776" width="300" height="54" rx="10" class="bottom-box" />
  <text x="358" y="808" class="label box-title" text-anchor="middle">Aggregate results over 10 iterations</text>

  <rect x="208" y="844" width="300" height="82" rx="10" class="bottom-box" />
  <text x="358" y="870" class="label box-title" text-anchor="middle">Step 8: Statistical validation tests</text>
  <text x="358" y="892" class="label box-body" text-anchor="middle">
    <tspan x="358" dy="0">(Friedman, Durbin-Conover,</tspan>
    <tspan x="358" dy="18">Nemenyi)</tspan>
  </text>

  <rect x="208" y="934" width="300" height="34" rx="10" class="bottom-box" />
  <text x="358" y="955" class="label box-title" text-anchor="middle">Report best method and findings</text>

  <line x1="358" y1="830" x2="358" y2="844" class="arrow" />
  <line x1="358" y1="926" x2="358" y2="934" class="arrow" />
</svg>
